#version: "3.9"          # Supported by both podman-compose and Docker Compose v2+
name: mcp-gateway-rs

networks:
  mcp-gateway-net:
    # Single user-defined bridge network keeps traffic private
    driver: bridge

###############################################################################
#  CORE SERVICE - ContextForge
###############################################################################
services:

  # ──────────────────────────────────────────────────────────────────────
  # Nginx Caching Proxy - High-performance reverse proxy with CDN-like caching
  # ──────────────────────────────────────────────────────────────────────
  nginx:
    image: nginx:latest
    restart: unless-stopped

    ports:
      - "8080:80"
    networks: [contextforge-gateway-net]
    dns:
      - 127.0.0.11
    command: [nginx, '-g', 'daemon off;']

    entrypoint: []
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:Z

    sysctls:
      - net.ipv4.tcp_fin_timeout=15
      - net.ipv4.ip_local_port_range=1024 65535
    ulimits:
      nofile:
        soft: 65535
        hard: 65535
    # healthcheck:
    #   test: ["CMD", "curl", "-f", "http://localhost/health"]
    #   interval: 30s
    #   timeout: 5s
    #   retries: 3
    #   start_period: 10s
    deploy:
      resources:
        limits:
          cpus: '4'
          memory: 1G
        reservations:
          cpus: '2'
          memory: 512M

  # ──────────────────────────────────────────────────────────────────────
  # mcp-gateway-rs
  #
  #
  # ──────────────────────────────────────────────────────────────────────

  contextforge-gateway-rs:
    image: ghcr.io/contextforge-gateway-rs:latest
    networks: [contextforge-gateway-net]

    environment:
      - CONTEXTFORGE_GATEWAY_RS_ADDRESS=0.0.0.0:4445
      - CONTEXTFORGE_GATEWAY_RS_REDIS_HOSTNAME=redis
      - CONTEXTFORGE_GATEWAY_RS_REDIS_PORT=6379
      - CONTEXTFORGE_GATEWAY_TOKEN_VERIFICATION_PUBLIC_KEY=/keys/jwt.key.pub
      - CONTEXTFORGE_GATEWAY_TOKEN_VERIFICATION_PRIVATE_KEY=/keys/jwt.key
      - RUST_LOG=debug

    sysctls:
      - net.ipv4.tcp_fin_timeout=15
      - net.ipv4.ip_local_port_range=1024 65535
    ulimits:
      nofile:
        soft: 65535
        hard: 65535

    depends_on:
      redis:
        condition: service_started

    healthcheck:
      ## Uncomment for HTTP healthcheck
      test:
        [
          "CMD",
          "python3",
          "-c",
          "import urllib.request; import json; resp =
            urllib.request.urlopen('http://localhost:4445/contextforge-rs/healt\
            h', timeout=5); data = json.loads(resp.read());
            print(data.get('status') == 'healthy'); exit(0 if data.get('status')
            == 'healthy' else 1)",
        ]

      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

    deploy:
      mode: replicated
      replicas: ${GATEWAY_REPLICAS:-2}
      resources:
        limits:
          cpus: '${GATEWAY_CPU_LIMIT:-8}'
          memory: ${GATEWAY_MEM_LIMIT:-8G}
        reservations:
          cpus: '${GATEWAY_CPU_RESERVATION:-4}'
          memory: ${GATEWAY_MEM_RESERVATION:-4G}

    # ──────────────────────────────────────────────────────────────────────
    # Volume Mounts
    # ──────────────────────────────────────────────────────────────────────
    # Mount catalog configuration and SSL certificates
    volumes:
      - ../assets/:/keys:z # mount catalog configuration

  contextforge-gateway-one:
    image: ghcr.io/contextforge-gateway-rs:latest
    networks: [contextforge-gateway-net]
    ports: [5551:4445]

    environment:
      - CONTEXTFORGE_GATEWAY_RS_ADDRESS=0.0.0.0:4445
      - CONTEXTFORGE_GATEWAY_RS_REDIS_HOSTNAME=redis
      - CONTEXTFORGE_GATEWAY_RS_REDIS_PORT=6379
      - CONTEXTFORGE_GATEWAY_TOKEN_VERIFICATION_PUBLIC_KEY=/keys/jwt.key.pub
      - CONTEXTFORGE_GATEWAY_TOKEN_VERIFICATION_PRIVATE_KEY=/keys/jwt.key
      - RUST_LOG=debug

    sysctls:
      - net.ipv4.tcp_fin_timeout=15
      - net.ipv4.ip_local_port_range=1024 65535
    ulimits:
      nofile:
        soft: 65535
        hard: 65535

    depends_on:
      redis:
        condition: service_started

    deploy:
      resources:
        limits:
          cpus: '${GATEWAY_CPU_LIMIT:-8}'
          memory: ${GATEWAY_MEM_LIMIT:-8G}
        reservations:
          cpus: '${GATEWAY_CPU_RESERVATION:-4}'
          memory: ${GATEWAY_MEM_RESERVATION:-4G}

    # ──────────────────────────────────────────────────────────────────────
    # Volume Mounts
    # ──────────────────────────────────────────────────────────────────────
    # Mount catalog configuration and SSL certificates
    volumes:
      - ../assets/:/keys:z # mount catalog configuration

  contextforge-gateway-two:
    image: ghcr.io/contextforge-gateway-rs:latest
    networks: [contextforge-gateway-net]
    ports: [5552:4445]

    environment:
      - CONTEXTFORGE_GATEWAY_RS_ADDRESS=0.0.0.0:4445
      - CONTEXTFORGE_GATEWAY_RS_REDIS_HOSTNAME=redis
      - CONTEXTFORGE_GATEWAY_RS_REDIS_PORT=6379
      - CONTEXTFORGE_GATEWAY_TOKEN_VERIFICATION_PUBLIC_KEY=/keys/jwt.key.pub
      - CONTEXTFORGE_GATEWAY_TOKEN_VERIFICATION_PRIVATE_KEY=/keys/jwt.key
      - RUST_LOG=debug

    sysctls:
      - net.ipv4.tcp_fin_timeout=15
      - net.ipv4.ip_local_port_range=1024 65535
    ulimits:
      nofile:
        soft: 65535
        hard: 65535

    depends_on:
      redis:
        condition: service_started

    deploy:
      resources:
        limits:
          cpus: '${GATEWAY_CPU_LIMIT:-8}'
          memory: ${GATEWAY_MEM_LIMIT:-8G}
        reservations:
          cpus: '${GATEWAY_CPU_RESERVATION:-4}'
          memory: ${GATEWAY_MEM_RESERVATION:-4G}

    # ──────────────────────────────────────────────────────────────────────
    # Volume Mounts
    # ──────────────────────────────────────────────────────────────────────
    # Mount catalog configuration and SSL certificates
    volumes:
      - ../assets/:/keys:z # mount catalog configuration

  mcp-counter-tool-one:
    image: ghcr.io/mcp-counter-tool:latest
    networks: [mcp-gateway-net]
    ports: [5601:5555]

    environment:
      - RUST_LOG=debug

    sysctls:
      - net.ipv4.tcp_fin_timeout=15
      - net.ipv4.ip_local_port_range=1024 65535
    ulimits:
      nofile:
        soft: 65535
        hard: 65535

    depends_on:
      redis:
        condition: service_started

    deploy:
      resources:
        limits:
          cpus: '${GATEWAY_CPU_LIMIT:-8}'
          memory: ${GATEWAY_MEM_LIMIT:-8G}
        reservations:
          cpus: '${GATEWAY_CPU_RESERVATION:-4}'
          memory: ${GATEWAY_MEM_RESERVATION:-4G}

  mcp-counter-tool-two:
    image: ghcr.io/mcp-counter-tool:latest
    networks: [mcp-gateway-net]
    ports: [5602:5555]

    environment:
      - RUST_LOG=debug

    sysctls:
      - net.ipv4.tcp_fin_timeout=15
      - net.ipv4.ip_local_port_range=1024 65535
    ulimits:
      nofile:
        soft: 65535
        hard: 65535

    depends_on:
      redis:
        condition: service_started

    deploy:
      resources:
        limits:
          cpus: '${GATEWAY_CPU_LIMIT:-8}'
          memory: ${GATEWAY_MEM_LIMIT:-8G}
        reservations:
          cpus: '${GATEWAY_CPU_RESERVATION:-4}'
          memory: ${GATEWAY_MEM_RESERVATION:-4G}

  ###############################################################################
  #  CACHE
  ###############################################################################
  redis:
    image: redis:latest
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    # Performance tuning for 1000+ RPS high-concurrency load testing
    command:
      - "redis-server"
      - "--maxmemory"
      - "1gb"
      - "--maxmemory-policy"
      - "allkeys-lru"
      - "--tcp-backlog"
      - "2048"
      - "--timeout"
      - "0"
      - "--tcp-keepalive"
      - "300"
      - "--maxclients"
      - "10000"
    ports:
      - "6379:6379" # expose only if you want host access
    networks: [mcp-gateway-net]
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '1'
          memory: 1G
